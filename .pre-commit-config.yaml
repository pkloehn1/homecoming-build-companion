---
# Pre-commit hooks for homecoming-build-companion.
# Install: pre-commit install
# Run all on demand: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: check-git-signing
        name: Check Git Commit Signing
        entry: python -m scripts.testing.hooks.check_git_signing
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-commit
      # Full Super-Linter parity (Docker). Slow, so manual-stage only: run with
      # `pre-commit run --hook-stage manual super-linter`. Uses the SAME image
      # tag and .github/super-linter.env as CI, so local == remote.
      - id: super-linter
        name: Super-Linter (Docker, manual)
        entry: python -m scripts.linting.run_super_linter
        language: system
        pass_filenames: false
        require_serial: true
        stages:
          - manual

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # v0.15.x supports target-version = "py314"; v0.8.0 caps at py313.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^(scripts|src)/
        additional_dependencies:
          - types-PyYAML

  # markdownlint + editorconfig-checker match the versions and config Super-Linter
  # runs, so `pre-commit` catches what CI would. markdownlint points at the SAME
  # .github/linters/.markdownlint.yml Super-Linter uses (it extends the root
  # .markdownlint.yaml). For exact parity, run scripts/linting/run_super_linter.sh.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .github/linters/.markdownlint.yml]

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.2.1
    hooks:
      - id: editorconfig-checker
        name: EditorConfig Compliance
        # Verbatim/harvested game data and generated extraction docs are exempt,
        # mirroring the Super-Linter FILTER_REGEX_EXCLUDE.
        exclude: ^(src/coh_engine/tests/fixtures/|samples/|data/canonical/|docs/engine/)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Verbatim game-data fixtures, sample builds, and the vendored .patch (whose
      # unified-diff context lines carry significant leading/trailing whitespace) must
      # stay byte-identical to their sources — exempt from whitespace fixers.
      - id: trailing-whitespace
        exclude: ^(src/coh_engine/tests/fixtures/|samples/|tools/mids-dump/patches/)
      - id: end-of-file-fixer
        exclude: ^(src/coh_engine/tests/fixtures/|samples/|tools/mids-dump/patches/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        # 15MB ceiling — canonical game data files (data/canonical/) include
        # multi-MB index JSONs harvested from the game install, and the
        # repo-wide manifest.json catalogs every file (~10MB). 15MB still
        # catches accidental binary commits while accommodating real data.
        args: [--maxkb=15360]
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^(src/coh_engine/tests/fixtures/|samples/|tools/mids-dump/patches/)
