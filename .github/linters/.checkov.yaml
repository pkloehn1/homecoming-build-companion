---
# Checkov configuration for Super-Linter (auto-discovered in LINTER_RULES_PATH).
#
# Scope: GitHub Actions configuration - the only IaC surface in this repo.
# Without framework scoping, Checkov's auto-detection tries every .json in the
# harvested game-data trees (data/canonical/ is tens of thousands of files) as
# potential CloudFormation/ARM templates and hangs the lint job past its
# 30-minute timeout.
framework:
  - github_actions
skip-path:
  - data/canonical
  - samples
  - src/coh_engine/tests/fixtures
