---

name: Commit Message Lint
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
permissions:
  contents: read


jobs:
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      # pull-requests:read is required so report-status-context can fetch the PR merge/head SHA.
      contents: read
      pull-requests: read
      # statuses:write is required so the report-status-context composite action
      # can publish the commit status for this job on the pull request.
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Lint commit messages
        shell: bash
        run: |
          failed=0
          for sha in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
            tmpfile=$(mktemp)
            git log -1 --format=%B "$sha" > "$tmpfile"
            if ! python3 scripts/testing/hooks/check_commit_message.py "$tmpfile"; then
              echo "::error::Commit $sha failed commitlint"
              failed=1
            fi
            rm -f "$tmpfile"
          done
          exit $failed

      - name: Report required status context
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: ./.github/actions/report-status-context
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          job-status: ${{ job.status }}
          status-context: Commit Message Lint / commitlint
          target-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

...
