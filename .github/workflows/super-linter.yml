---
name: Super-Linter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      full_scan:
        description: Scan full codebase (set VALIDATE_ALL_CODEBASE=true)
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    # Backstop: scanners crawling the large game-data trees must fail fast,
    # not consume a 6-hour runner slot.
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Load shared linter config into GITHUB_ENV so the Super-Linter
      # step inherits every VALIDATE_* flag from a single source of truth.
      - name: Load shared Super-Linter configuration
        run: grep -v '^#' .github/super-linter.env >> "$GITHUB_ENV"

      - name: Super-Linter
        uses: super-linter/super-linter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: origin/${{ github.event.repository.default_branch }}
          # --- Environment-specific overrides (not in shared .env) ---
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.full_scan) }}
          # Excluded from linting:
          # - samples/, engine fixtures, data/canonical/: verbatim/harvested
          #   game data, must stay byte-identical to MidsReborn/Homecoming.
          # - docs/engine/: generated extraction output (lint-exempt per
          #   .claude/rules/markdown.md).
          # - scripts/*.ps1 + scripts/lane-*/: legacy PowerShell capture lane,
          #   replaced by Python in the Phase 3 migration.
          FILTER_REGEX_EXCLUDE: '((.*/)?(samples/|src/coh_engine/tests/fixtures/|data/canonical/|docs/engine/).*|scripts/[^/]+\.ps1|scripts/lane-[ab]/.*)'
          JSCPD_LINTER_RULES: /github/workspace/.github/linters/.jscpd.json
          # data/canonical holds tens of thousands of harvested JSON files -
          # Checkov crawling it is the known hang; there is no IaC in it.
          CHECKOV_SKIP_PATH: /tmp,/github/workspace/tmp,/github/workspace/data/canonical,/github/workspace/samples
          SAVE_SUPER_LINTER_SUMMARY: true
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: true

      # --- Spoke-specific: report status for ruleset required checks ---
      - name: Report required status context
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: ./.github/actions/report-status-context
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          job-status: ${{ job.status }}
          status-context: Super-Linter / Lint Code Base
          target-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
...
